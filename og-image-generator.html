<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P·L·A·Y - OG 分享卡片生成器</title>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;0,800;1,400&family=Noto+Sans+SC:wght@400;700;900&display=swap");

    body {
      background-color: #1e293b;

      font-family: "Noto Sans SC", sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .font-mono {
      font-family: "JetBrains Mono", monospace;
    }

    .bg-grid {
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    }

    .barcode {
      background-image: repeating-linear-gradient(to right,
          currentColor 0,
          currentColor 2px,
          transparent 2px,
          transparent 4px,
          currentColor 4px,
          currentColor 5px,
          transparent 5px,
          transparent 8px,
          currentColor 8px,
          currentColor 12px,
          transparent 12px,
          transparent 14px);
    }

    .glitch-text {
      position: relative;
      display: inline-block;
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      opacity: 0.8;
    }

    .glitch-text::before {
      left: 3px;
      text-shadow: -2px 0 #ff00c1;
      clip-path: inset(20% 0 80% 0);
    }

    .glitch-text::after {
      left: -3px;
      text-shadow: -2px 0 #00fff9;
      clip-path: inset(60% 0 10% 0);
    }
  </style>

  <style type="text/tailwindcss">
    @theme {
        --color-slate-900: #0f172a;
        --color-slate-950: #020617;
        --animate-spin-slow: spin 8s linear infinite;
        --animate-pulse-slow: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
</head>

<body>
  <div class="mb-8 flex flex-col items-center gap-4">
    <h1 class="text-white text-2xl font-bold tracking-wider">
      P·L·A·Y OG 图片生成器
    </h1>
    <p class="text-slate-400 text-sm">
      标准尺寸: 1200 x 630 px (适用于微信、QQ、Twitter 分享卡片)
    </p>
    <button id="download-btn"
      class="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold font-mono rounded shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all">
      [ 导 出 og-image.jpg ]
    </button>
  </div>


  <div id="og-card"
    class="relative bg-slate-950 w-[1200px] h-[630px] overflow-hidden rounded-md shadow-2xl flex border border-slate-800">

    <div class="absolute inset-0 bg-grid z-0"></div>
    <div
      class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-emerald-600/10 blur-[120px] pointer-events-none z-0">
    </div>
    <div
      class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-purple-600/10 blur-[120px] pointer-events-none z-0">
    </div>


    <div
      class="relative z-10 flex flex-col justify-between w-3/5 p-16 border-r border-slate-800/80 bg-linear-to-r from-slate-950 via-slate-950/90 to-transparent">

      <div class="flex flex-col gap-3">
        <div
          class="inline-flex w-max items-center gap-2 px-3 py-1.5 rounded-sm border border-red-500/30 bg-red-500/10 text-red-400 font-mono text-sm shadow-[0_0_15px_rgba(239,68,68,0.15)]">
          <span class="w-2 h-2 rounded-full bg-red-500"></span>
          SYS_WARNING // 临床风险告知
        </div>
        <div class="text-slate-500 font-mono text-sm tracking-widest">
          > TARGET_ANALYSIS : 虚伪外骨骼剥离中...
        </div>
      </div>


      <div class="flex flex-col gap-4 mt-8">
        <h2 class="text-slate-400 text-2xl font-bold tracking-widest">
          SBTI 赛博变体已部署
        </h2>
        <h1 class="text-[90px] leading-none font-black text-slate-100 tracking-tighter glitch-text drop-shadow-lg"
          data-text="P·L·A·Y">
          P·L·A·Y
        </h1>
        <h2
          class="text-emerald-400 text-3xl font-black tracking-widest mt-2 drop-shadow-[0_0_10px_rgba(52,211,153,0.5)]">
          玩家共鸣诊断终端
        </h2>

        <p
          class="mt-6 text-slate-300 text-2xl font-medium leading-relaxed max-w-xl border-l-4 border-slate-700 pl-6 py-2">
          别装了。在这个地下诊所里，<br />
          你的<span class="text-emerald-400">吃灰库存</span>和<span class="text-emerald-400">深夜红温</span>，都在出卖你。
        </p>
      </div>


      <div class="mt-auto flex items-end justify-between pr-8">
        <div class="flex flex-col gap-2">
          <div class="w-48 h-8 barcode text-slate-600"></div>
          <div class="text-slate-500 font-mono text-xs tracking-widest">
            ID: 0x4F9A_NEURAL_LINK
          </div>
        </div>
        <div class="text-slate-400 font-mono text-xl font-bold tracking-widest drop-shadow-sm">
          PLAY.LXCHAPU.COM
        </div>
      </div>
    </div>

    <div class="relative z-10 w-2/5 flex items-center justify-center bg-slate-900/20">

      <div class="absolute top-8 right-8 w-16 h-16 border-t-2 border-r-2 border-slate-700/50"></div>
      <div class="absolute bottom-8 right-8 w-16 h-16 border-b-2 border-r-2 border-slate-700/50"></div>

      <div class="relative w-[400px] h-[400px] flex items-center justify-center">

        <div class="absolute inset-0 border-[3px] border-dashed border-slate-700/60 rounded-full animate-spin-slow">
        </div>

        <div class="absolute inset-4 border border-slate-600/40 rounded-full"></div>

        <div
          class="relative w-[280px] h-[280px] rounded-full border border-emerald-500/30 bg-emerald-950/20 shadow-[0_0_50px_rgba(16,185,129,0.15)] flex items-center justify-center">

          <div class="absolute w-full h-px bg-emerald-500/30"></div>
          <div class="absolute h-full w-px bg-emerald-500/30"></div>


          <svg viewBox="0 0 100 100" class="absolute w-[200px] h-[200px] text-emerald-400">
            <polygon points="50,10 80,30 90,70 60,90 20,80 15,40" fill="rgba(16, 185, 129, 0.2)" stroke="currentColor"
              stroke-width="1.5" class="drop-shadow-[0_0_8px_rgba(16,185,129,0.5)]" />
            <circle cx="50" cy="10" r="2" fill="currentColor" />
            <circle cx="80" cy="30" r="2" fill="currentColor" />
            <circle cx="90" cy="70" r="2" fill="currentColor" />
            <circle cx="60" cy="90" r="2" fill="currentColor" />
            <circle cx="20" cy="80" r="2" fill="currentColor" />
            <circle cx="15" cy="40" r="2" fill="currentColor" />
          </svg>

          <div class="absolute w-3 h-3 bg-red-500 rounded-full shadow-[0_0_10px_rgba(239,68,68,0.8)] animate-pulse">
          </div>
        </div>
        <div
          class="absolute top-[15%] right-[10%] text-emerald-400 font-mono text-sm bg-slate-900/80 px-2 py-1 border border-emerald-500/30 rounded">
          P_82%
        </div>
        <div
          class="absolute bottom-[20%] right-[15%] text-slate-400 font-mono text-sm bg-slate-900/80 px-2 py-1 border border-slate-700 rounded">
          A_99%
        </div>
        <div
          class="absolute bottom-[15%] left-[10%] text-red-400 font-mono text-sm bg-slate-900/80 px-2 py-1 border border-red-500/30 rounded animate-pulse">
          L_12%
        </div>
        <div
          class="absolute top-[25%] left-[5%] text-slate-400 font-mono text-sm bg-slate-900/80 px-2 py-1 border border-slate-700 rounded">
          Y_45%
        </div>
      </div>
    </div>
  </div>

  <script>
    document
      .getElementById("download-btn")
      .addEventListener("click", async () => {
        const node = document.getElementById("og-card");
        const btn = document.getElementById("download-btn");

        const originalText = btn.innerText;
        btn.innerText = "[ 生成中... ]";
        btn.disabled = true;

        try {

          const dataUrl = await htmlToImage.toJpeg(node, {
            quality: 0.95,
            pixelRatio: 1,
          });

          // 触发下载
          const link = document.createElement("a");
          link.download = "og-image.jpg";
          link.href = dataUrl;
          link.click();
        } catch (error) {
          console.error("Oops, something went wrong!", error);
          alert("生成图片失败，请重试或直接截图。");
        } finally {
          btn.innerText = originalText;
          btn.disabled = false;
        }
      });
  </script>
</body>

</html>
